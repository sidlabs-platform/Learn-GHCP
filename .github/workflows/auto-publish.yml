name: "Stage 4: Auto-Publish"

on:
  pull_request_review:
    types: [submitted]
  schedule:
    - cron: '0 12 * * *'  # Check for 48hr-old needs-review PRs daily at noon
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run auto-publish logic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node agents/review/auto-publish.js
