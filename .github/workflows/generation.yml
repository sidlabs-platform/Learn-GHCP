name: "Stage 2: Course Generation"

on:
  workflow_run:
    workflows: ["Stage 1: Feature Discovery"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Course Generation Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node agents/generation/generate.js

      - name: Create PR with new courses
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="auto/courses-$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add src/content/courses/ data/catalog.yaml data/learning-paths.yaml
          git diff --staged --quiet && echo "No new courses to generate" && exit 0
          git commit -m "feat: auto-generate courses [generation-agent]"
          git push origin "$BRANCH"
          gh pr create --title "🤖 Auto-generated courses $(date +%Y-%m-%d)" \
            --body "Courses auto-generated by the Course Generation Agent." \
            --base main --head "$BRANCH"
