# Source Registry - Auto-expanding list of content sources
# New sources are auto-discovered and added by the Feature Discovery Agent
# 
# Schema:
#   id: unique identifier for the source
#   name: human-readable name
#   url: source URL
#   type: docs|blog|github_releases|marketplace
#   crawlFrequency: daily|weekly|monthly
#   lastCrawled: ISO 8601 timestamp or null
#   status: active|inactive|archived
#   confidenceScore: 0.0-1.0 (1.0 = official, 0.5+ = trusted)
#   tags: array of topic tags

sources:
